<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OpenClaw第三方API配置生成器</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z' fill='%23FF5A36' opacity='0.15'/><path d='M15.5 8.5c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5.67 1.5 1.5 1.5 1.5-.67 1.5-1.5zM11.5 8.5c0-.83-.67-1.5-1.5-1.5S8.5 7.67 8.5 8.5 9.17 10 10 10s1.5-.67 1.5-1.5zM12 17.5c2.33 0 4.31-1.46 5.11-3.5H6.89c.8 2.04 2.78 3.5 5.11 3.5z' fill='%23FF5A36'/></svg>" type="image/svg+xml">
</head>
<body>
  <!-- Top navigation bar -->
  <div class="topbar">
    <svg class="topbar-logo" viewBox="0 0 24 24" fill="none">
      <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z" fill="#FF5A36" opacity="0.15"/>
      <path d="M15.5 8.5c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5.67 1.5 1.5 1.5 1.5-.67 1.5-1.5zM11.5 8.5c0-.83-.67-1.5-1.5-1.5S8.5 7.67 8.5 8.5 9.17 10 10 10s1.5-.67 1.5-1.5zM12 17.5c2.33 0 4.31-1.46 5.11-3.5H6.89c.8 2.04 2.78 3.5 5.11 3.5z" fill="#FF5A36"/>
    </svg>
    <span class="topbar-title">OpenClaw</span>
  </div>

  <div class="wrap">
    <!-- Page header -->
    <div class="page-header">
      <span class="page-label">Tools</span>
      <h1>第三方API配置生成器</h1>
      <p class="page-desc">将第三方 API 设置安全地合并到您的 openclaw.json 配置中，无需手动编辑。</p>
    </div>

    <div class="card">
      <h2>API 设置</h2>

      <!-- 1. 预设供应商 -->
      <div class="form-group">
        <label>预设供应商</label>
        <div id="preset-chips" class="chip-group">
          <button type="button" class="chip active" data-preset="custom">自定义配置</button>
          <!-- 其余 chip 由 JS 动态生成 -->
        </div>
      </div>

      <!-- 2 & 3. 供应商标识 + 供应商名称 -->
      <div class="row">
        <div class="form-group">
          <label for="provider_key">供应商标识 <span class="required">*</span></label>
          <input id="provider_key" type="text" placeholder="用于 models.providers 的键名">
        </div>
        <div class="form-group">
          <label for="provider_name">供应商名称</label>
          <input id="provider_name" type="text" placeholder="供应商显示名称">
        </div>
      </div>

      <!-- 4 & 5. 官网链接 + API端点 -->
      <div class="row">
        <div class="form-group">
          <label for="website">官网链接</label>
          <input id="website" type="text" placeholder="https://example.com">
        </div>
        <div class="form-group">
          <label for="api_endpoint">API 端点</label>
          <select id="api_endpoint">
            <option value="openai-completions">OpenAI-compatible (Uses /chat/completions)</option>
            <option value="anthropic-messages">Anthropic-compatible</option>
            <option value="">Unknown (detect automatically)</option>
          </select>
        </div>
      </div>

      <!-- 6. Base URL + API Key -->
      <div class="row">
        <div class="form-group">
          <label for="baseurl">Base URL <span class="required">*</span></label>
          <input id="baseurl" type="text" placeholder="https://api.example.com">
        </div>
        <div class="form-group">
          <label for="apikey">API Key <span class="required">*</span></label>
          <input id="apikey" type="text" placeholder="请输入 API Key">
        </div>
      </div>

      <!-- 7. 模型列表 -->
      <div class="form-group">
        <label>模型列表</label>
        <div id="model-list">
          <!-- 动态行在 JS 中生成 -->
        </div>
        <button type="button" id="addModelBtn" class="add-btn">+ 添加模型</button>
      </div>

      <!-- 8. Config JSON -->
      <div class="form-group">
        <div class="label-with-action">
          <label for="config">Config (JSON/String)</label>
          <div class="action-btns">
            <button type="button" id="importConfigBtn" class="import-btn">导入配置</button>
            <button type="button" id="applyConfigBtn" class="import-btn apply-btn">应用配置</button>
          </div>
        </div>
        <textarea id="config" placeholder="粘贴您的~/.openclaw/openclaw.json内容，或在您的openclaw的web控制台中的setting下的config选项卡中，切换为Raw模式找到"></textarea>
      </div>

      <div class="actions">
        <button id="sendBtn">生成配置</button>
        <span class="muted" id="status">就绪</span>
      </div>
    </div>

    <div class="codebox">
      <button id="copyBtn" class="copy-btn">复制</button>
      <pre><code id="output">响应将显示在这里</code></pre>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
